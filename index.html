<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alfather</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Libre+Baskerville&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg:    #f0ece3;
      --text:  #1a1916;
      --muted: #7a7672;
      --dim:   #b0aca4;
      --rule:  #cdc9c0;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Cormorant Garamond', Georgia, serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 3rem 2rem;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.08) 100%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      opacity: 0.06;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      pointer-events: none;
      z-index: 0;
    }

    .stage {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      animation: rise 1.4s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fade-in {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .mark {
      width: 1px;
      height: 64px;
      background: linear-gradient(to bottom, transparent, var(--dim));
      margin-bottom: 3rem;
      animation: fade-in 1.8s ease both;
    }

    .wordmark {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 300;
      font-size: clamp(3.5rem, 10vw, 7rem);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text);
      line-height: 1;
      margin-bottom: 2.25rem;
    }

    .rule {
      width: 40px;
      height: 1px;
      background: var(--rule);
      margin-bottom: 2.25rem;
    }

    .tagline {
      font-family: 'Libre Baskerville', Georgia, serif;
      font-size: clamp(0.7rem, 1.8vw, 0.8rem);
      font-weight: 400;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 3.5rem;
    }

    .contact {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(0.85rem, 2vw, 1rem);
      font-weight: 400;
      letter-spacing: 0.12em;
      color: var(--dim);
      text-decoration: none;
      border-bottom: 1px solid var(--rule);
      padding-bottom: 2px;
      transition: color 0.25s ease, border-color 0.25s ease;
    }

    .contact:hover {
      color: var(--muted);
      border-color: var(--muted);
    }

    .mark-bottom {
      width: 1px;
      height: 64px;
      background: linear-gradient(to top, transparent, var(--dim));
      margin-top: 3rem;
      animation: fade-in 1.8s ease both;
    }

    footer {
      position: fixed;
      bottom: 2rem;
      left: 0;
      right: 0;
      text-align: center;
      font-family: 'Libre Baskerville', Georgia, serif;
      font-size: 0.62rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--rule);
      z-index: 1;
      animation: fade-in 2.4s ease both;
    }
  </style>
</head>
<body>

  <main class="stage">
    <div class="mark" aria-hidden="true"></div>

    <h1 class="wordmark">Alfather</h1>

    <div class="rule" aria-hidden="true"></div>

    <p class="tagline">Coming Soon</p>

    <div class="mark-bottom" aria-hidden="true"></div>
  </main>

  <footer>Alfather LLC &nbsp;&middot;&nbsp; All rights reserved</footer>

</body>
</html>
